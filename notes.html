<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyHub | Notes</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>StudyHub</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="resources.html">Resources</a>
      <a href="notes.html">Notes</a>
    </nav>
  </header>

  <main class="page">
    <section class="card">
      <h2>Study Notes</h2>

      <textarea
  id="notesArea"
  rows="10"
  placeholder="Write your notes here..."
></textarea>

<br><br>

<button id="saveNotesBtn">Save Notes</button>

<p id="saveMessage"></p>
    </section>
  </main>

  <script>
const notesArea = document.getElementById("notesArea");
const saveBtn = document.getElementById("saveNotesBtn");
const saveMessage = document.getElementById("saveMessage");

// Load saved notes
const savedNotes = localStorage.getItem("studyhubNotes");

if (savedNotes) {
  notesArea.value = savedNotes;
}

// Save notes
saveBtn.addEventListener("click", () => {
  localStorage.setItem("studyhubNotes", notesArea.value);

  saveMessage.textContent = "Notes saved successfully!";
  
  setTimeout(() => {
    saveMessage.textContent = "";
  }, 3000);
});
</script>
</body>
</html>
